name: Rust CI

on:
  pull_request:
  push:
    branches:
      - main
      - chore/surrealdb-3-upgrade-audit

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Cargo check
        run: cargo check --workspace

      - name: Cargo test
        run: cargo test --workspace --quiet -- --test-threads=1
