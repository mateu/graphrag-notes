# GraphRAG Notes Configuration

[database]
# Path to the database (relative to home directory)
path = ".graphrag/data-v3"

[inference]
# Embeddings backend (TEI by default, or Ollama when TEI_PROVIDER=ollama)
embedding_url = "http://localhost:8081"
# Entity extraction backend (TGI by default, or Ollama when TGI_PROVIDER=ollama)
extraction_url = "http://localhost:8082"
# Timeout for inference requests in seconds
timeout_secs = 30
# Optional local-Ollama defaults for the Rust inference clients
ollama_url = "http://localhost:11434"
embedding_model = "bge-m3:latest"
extraction_model = "phi4-mini:latest"

[search]
# Default number of results to return
default_limit = 10
# Weights for hybrid search (vector vs full-text)
vector_weight = 0.7
fulltext_weight = 0.3

[gardener]
# Minimum similarity score to suggest a connection
similarity_threshold = 0.7
# Auto-apply connections above this threshold
auto_apply_threshold = 0.85
# Maximum suggestions to generate per run
max_suggestions = 50

[librarian]
# Minimum chunk size (characters) when splitting documents
min_chunk_size = 50
# Maximum chunk size
max_chunk_size = 1000

[logging]
# Log level: trace, debug, info, warn, error
level = "info"
